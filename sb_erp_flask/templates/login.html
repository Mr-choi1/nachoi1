<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SB선보 ERP 시스템 - 로그인</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: white;
      width: 100%;
      max-width: 380px;
      padding: 40px 35px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #1e3c72;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #1e3c72;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2a5298;
    }

    .error {
      background: #fdecea;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">SB</div>
      <span>SB선보 ERP</span>
    </div>
    <div class="subtitle">부서 계정으로 로그인하세요</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>

      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit">로그인</button>
    </form>

    <div class="hint">
      데모 계정: admin / admin1234 (관리부, 전체 조회)<br>
      부서별 데모 계정은 관리자에게 문의하세요.
    </div>
  </div>
</body>
</html>
