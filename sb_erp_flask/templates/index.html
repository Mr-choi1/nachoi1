<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SB선보 ERP 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #1e3c72;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 24px;
    }

    /* 메인 타이틀 */
    .main-title {
      text-align: center;
      color: white;
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    /* 카테고리 버튼 */
    .category-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 15px 30px;
      background: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #1e3c72;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .category-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      background: #f0f4ff;
    }

    .category-btn:active {
      transform: translateY(-1px);
    }

    /* 챗봇 영역 */
    .chatbot-container {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .chat-messages {
      height: 400px;
      overflow-y: auto;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      background: #f9f9f9;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      max-width: 80%;
      animation: fadeIn 0.3s;
      white-space: pre-line;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      background: #1e3c72;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot-message {
      background: #e3f2fd;
      color: #333;
      margin-right: auto;
    }

    .input-container {
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 15px;
      border: 2px solid #1e3c72;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    #sendBtn {
      padding: 15px 30px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    #sendBtn:hover {
      background: #2a5298;
      transform: scale(1.05);
    }

    /* 결과 표시 영역 */
    .result-container {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: none;
    }

    .result-container.show {
      display: block;
      animation: slideUp 0.5s;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-size: 24px;
      font-weight: bold;
      color: #1e3c72;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid #1e3c72;
    }

    /* 테이블 스타일 */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      background: #1e3c72;
      color: white;
      font-weight: bold;
    }

    tr:hover {
      background: #f5f5f5;
    }

    /* 차트 컨테이너 */
    .chart-container {
      margin: 30px 0;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 10px;
    }

    canvas {
      max-height: 400px;
    }

    /* 요약 카드 */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 10px;
      color: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .summary-card h3 {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: bold;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1e3c72;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">SB</div>
        <span>SB선보</span>
      </div>
      <div style="color: #666; font-size: 14px;">ERP Management System</div>
    </div>

    <!-- 메인 타이틀 -->
    <div class="main-title">안녕하세요! 무엇을 도와드릴까요?</div>

    <!-- 카테고리 버튼 -->
    <div class="category-buttons">
      <button class="category-btn" onclick="loadCategory('financial')">💰 재무</button>
      <button class="category-btn" onclick="loadCategory('production')">🏭 생산</button>
      <button class="category-btn" onclick="loadCategory('purchase')">🛒 구매</button>
      <button class="category-btn" onclick="loadCategory('quality')">✅ 품질</button>
      <button class="category-btn" onclick="loadCategory('hr')">👥 인사</button>
    </div>

    <!-- 챗봇 영역 -->
    <div class="chatbot-container">
      <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
          안녕하세요! SB선보 ERP AI 어시스턴트입니다. 궁금하신 내용을 질문해주세요.

💡 질문 예시:
- "4월과 6월 생산량 비교해줘"
- "불량의 원인이 뭐야?"
- "3월 매출 알려줘"
- "생산부 출근율 보여줘"
        </div>
      </div>
      <div class="input-container">
        <input type="text" id="userInput" placeholder="예: 4월과 6월 생산량 비교해줘" onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </div>

    <!-- 결과 표시 영역 -->
    <div class="result-container" id="resultContainer">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    let currentChart = null; // 차트 인스턴스 저장

    // 엔터키 처리
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // 메시지 전송
    function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();

      if (!message) return;

      // 사용자 메시지 표시
      addMessage(message, 'user');
      input.value = '';

      // 로딩 표시
      showLoading();

      // AI 처리 요청 (Flask API 호출)
      fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: message })
      })
        .then(res => res.json())
        .then(handleAIResponse)
        .catch(handleError);
    }

    // 카테고리 로드
    function loadCategory(category) {
      showLoading();

      fetch(`/api/category/${category}`)
        .then(res => res.json())
        .then(handleAIResponse)
        .catch(handleError);
    }

    // 메시지 추가
    function addMessage(text, type) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}-message`;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 로딩 표시
    function showLoading() {
      const messagesDiv = document.getElementById('chatMessages');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading';
      loadingDiv.id = 'loading';
      loadingDiv.innerHTML = '<div class="spinner"></div><div>데이터를 조회하고 있습니다...</div>';
      messagesDiv.appendChild(loadingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 로딩 제거
    function removeLoading() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    }

    // AI 응답 처리
    function handleAIResponse(response) {
      removeLoading();

      // 봇 메시지 추가
      addMessage(response.message, 'bot');

      // 결과 표시
      if (response.data) {
        displayResult(response);
      }
    }

    // 결과 표시
    function displayResult(response) {
      const container = document.getElementById('resultContainer');
      const title = document.getElementById('resultTitle');
      const content = document.getElementById('resultContent');

      // 이전 차트 제거
      if (currentChart) {
        currentChart.destroy();
        currentChart = null;
      }

      container.classList.add('show');

      switch(response.type) {
        case 'financial':
          title.textContent = '📊 재무 현황';
          content.innerHTML = renderFinancialData(response.data);
          break;
        case 'production':
          title.textContent = '🏭 생산 현황';
          content.innerHTML = renderProductionData(response.data);
          break;
        case 'purchase':
          title.textContent = '🛒 구매 현황';
          content.innerHTML = renderPurchaseData(response.data);
          break;
        case 'quality':
          title.textContent = '✅ 품질 현황';
          content.innerHTML = renderQualityData(response.data);
          break;
        case 'quality_cause':
          title.textContent = '🔍 불량 원인 분석';
          content.innerHTML = renderQualityCauseData(response.data);
          break;
        case 'hr':
          title.textContent = '👥 인사 현황';
          content.innerHTML = renderHRData(response.data);
          break;
      }
    }

    // 재무 데이터 렌더링
    function renderFinancialData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 매출</h3>
          <div class="value">${formatNumber(data.summary.totalRevenue)}원</div>
        </div>
        <div class="summary-card">
          <h3>총 비용</h3>
          <div class="value">${formatNumber(data.summary.totalExpense)}원</div>
        </div>
        <div class="summary-card">
          <h3>순이익</h3>
          <div class="value">${formatNumber(data.summary.netProfit)}원</div>
        </div>
        <div class="summary-card">
          <h3>수익률</h3>
          <div class="value">${data.summary.profitRate}%</div>
        </div>
      `;
      html += '</div>';

      if (data.monthly && data.monthly.length > 0) {
        html += '<h3 style="margin-top: 20px; color: #1e3c72;">월별 재무 현황</h3>';
        html += '<table><thead><tr><th>월</th><th>매출</th><th>비용</th><th>이익</th></tr></thead><tbody>';
        data.monthly.forEach(row => {
          html += `<tr>
            <td>${row.month}</td>
            <td>${formatNumber(row.revenue)}원</td>
            <td>${formatNumber(row.expense)}원</td>
            <td>${formatNumber(row.profit)}원</td>
          </tr>`;
        });
        html += '</tbody></table>';

        html += '<div class="chart-container"><canvas id="financialChart"></canvas></div>';

        setTimeout(() => {
          renderFinancialChart(data.monthly);
        }, 100);
      }

      return html;
    }

    // 생산 데이터 렌더링
    function renderProductionData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 생산량</h3>
          <div class="value">${formatNumber(data.summary.totalProduction)}개</div>
        </div>
        <div class="summary-card">
          <h3>불량률</h3>
          <div class="value">${data.summary.defectRate}%</div>
        </div>
        <div class="summary-card">
          <h3>가동률</h3>
          <div class="value">${data.summary.efficiency}%</div>
        </div>
      `;
      html += '</div>';

      // 월별 데이터가 있으면 표시
      if (data.monthly && data.monthly.length > 0) {
        html += '<h3 style="margin-top: 20px; color: #1e3c72;">월별 생산 현황</h3>';
        html += '<table><thead><tr><th>월</th><th>총 생산량</th><th>양품</th><th>불량품</th><th>불량률</th><th>가동률</th></tr></thead><tbody>';
        data.monthly.forEach(row => {
          html += `<tr>
            <td>${row.month}</td>
            <td>${formatNumber(row.totalProduction)}개</td>
            <td>${formatNumber(row.goodProducts)}개</td>
            <td>${formatNumber(row.defectProducts)}개</td>
            <td>${row.defectRate}%</td>
            <td>${row.efficiency}%</td>
          </tr>`;
        });
        html += '</tbody></table>';

        html += '<div class="chart-container"><canvas id="productionChart"></canvas></div>';

        setTimeout(() => {
          renderProductionMonthlyChart(data.monthly);
        }, 100);
      } else if (data.products && data.products.length > 0) {
        // 제품별 데이터 표시
        html += '<h3 style="margin-top: 20px; color: #1e3c72;">제품별 생산 현황</h3>';
        html += '<table><thead><tr><th>제품명</th><th>생산량</th><th>목표량</th><th>달성률</th></tr></thead><tbody>';
        data.products.forEach(row => {
          html += `<tr>
            <td>${row.name}</td>
            <td>${formatNumber(row.quantity)}개</td>
            <td>${formatNumber(row.target)}개</td>
            <td>${row.rate}%</td>
          </tr>`;
        });
        html += '</tbody></table>';

        html += '<div class="chart-container"><canvas id="productionChart"></canvas></div>';

        setTimeout(() => {
          renderProductionChart(data.products);
        }, 100);
      }

      return html;
    }

    // 구매 데이터 렌더링
    function renderPurchaseData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 발주 건수</h3>
          <div class="value">${data.summary.totalOrders}건</div>
        </div>
        <div class="summary-card">
          <h3>총 발주 금액</h3>
          <div class="value">${formatNumber(data.summary.totalAmount)}원</div>
        </div>
        <div class="summary-card">
          <h3>대기 중</h3>
          <div class="value">${data.summary.pendingOrders}건</div>
        </div>
      `;
      html += '</div>';

      html += '<h3 style="margin-top: 20px; color: #1e3c72;">주요 발주 내역</h3>';
      html += '<table><thead><tr><th>공급업체</th><th>품목</th><th>금액</th><th>상태</th></tr></thead><tbody>';
      data.orders.forEach(row => {
        html += `<tr>
          <td>${row.supplier}</td>
          <td>${row.item}</td>
          <td>${formatNumber(row.amount)}원</td>
          <td>${row.status}</td>
        </tr>`;
      });
      html += '</tbody></table>';

      return html;
    }

    // 품질 데이터 렌더링
    function renderQualityData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 검사 건수</h3>
          <div class="value">${formatNumber(data.summary.totalInspections)}건</div>
        </div>
        <div class="summary-card">
          <h3>합격률</h3>
          <div class="value">${data.summary.passRate}%</div>
        </div>
        <div class="summary-card">
          <h3>불량 건수</h3>
          <div class="value">${data.summary.defectCount}건</div>
        </div>
      `;
      html += '</div>';

      html += '<h3 style="margin-top: 20px; color: #1e3c72;">불량 유형별 분석</h3>';
      html += '<table><thead><tr><th>불량 유형</th><th>건수</th><th>비율</th></tr></thead><tbody>';
      data.defectTypes.forEach(row => {
        html += `<tr>
          <td>${row.type}</td>
          <td>${row.count}건</td>
          <td>${row.rate}%</td>
        </tr>`;
      });
      html += '</tbody></table>';

      html += '<div class="chart-container"><canvas id="qualityChart"></canvas></div>';

      setTimeout(() => {
        renderQualityChart(data.defectTypes);
      }, 100);

      return html;
    }

    // 불량 원인 분석 렌더링
    function renderQualityCauseData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 검사 건수</h3>
          <div class="value">${formatNumber(data.summary.totalInspections)}건</div>
        </div>
        <div class="summary-card">
          <h3>합격률</h3>
          <div class="value">${data.summary.passRate}%</div>
        </div>
        <div class="summary-card">
          <h3>불량 건수</h3>
          <div class="value">${data.summary.defectCount}건</div>
        </div>
      `;
      html += '</div>';

      if (data.causeAnalysis && data.causeAnalysis.causes) {
        html += `<h3 style="margin-top: 20px; color: #1e3c72;">주요 원인: ${data.causeAnalysis.mainDefect}</h3>`;
        html += '<table><thead><tr><th>원인</th><th>비율</th></tr></thead><tbody>';
        data.causeAnalysis.causes.forEach(row => {
          html += `<tr>
            <td>${row.cause}</td>
            <td><strong>${row.percent}%</strong></td>
          </tr>`;
        });
        html += '</tbody></table>';

        html += '<div class="chart-container"><canvas id="causeChart"></canvas></div>';

        setTimeout(() => {
          renderCauseChart(data.causeAnalysis.causes);
        }, 100);
      }

      return html;
    }

    // 인사 데이터 렌더링
    function renderHRData(data) {
      let html = '<div class="summary-cards">';
      html += `
        <div class="summary-card">
          <h3>총 직원 수</h3>
          <div class="value">${data.summary.totalEmployees}명</div>
        </div>
        <div class="summary-card">
          <h3>신규 입사</h3>
          <div class="value">${data.summary.newHires}명</div>
        </div>
        <div class="summary-card">
          <h3>퇴사자</h3>
          <div class="value">${data.summary.resignations}명</div>
        </div>
        <div class="summary-card">
          <h3>평균 출근율</h3>
          <div class="value">${data.summary.avgAttendance}%</div>
        </div>
      `;
      html += '</div>';

      html += '<h3 style="margin-top: 20px; color: #1e3c72;">부서별 현황</h3>';
      html += '<table><thead><tr><th>부서명</th><th>인원</th><th>출근율</th></tr></thead><tbody>';
      data.departments.forEach(row => {
        html += `<tr>
          <td>${row.name}</td>
          <td>${row.employees}명</td>
          <td>${row.attendance}%</td>
        </tr>`;
      });
      html += '</tbody></table>';

      html += '<div class="chart-container"><canvas id="hrChart"></canvas></div>';

      setTimeout(() => {
        renderHRChart(data.departments);
      }, 100);

      return html;
    }

    // 재무 차트
    function renderFinancialChart(data) {
      const ctx = document.getElementById('financialChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.month),
          datasets: [{
            label: '매출',
            data: data.map(d => d.revenue),
            backgroundColor: 'rgba(30, 60, 114, 0.7)'
          }, {
            label: '비용',
            data: data.map(d => d.expense),
            backgroundColor: 'rgba(255, 99, 132, 0.7)'
          }, {
            label: '이익',
            data: data.map(d => d.profit),
            backgroundColor: 'rgba(75, 192, 192, 0.7)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '월별 재무 현황 차트'
            }
          }
        }
      });
    }

    // 생산 제품별 차트
    function renderProductionChart(data) {
      const ctx = document.getElementById('productionChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.name),
          datasets: [{
            label: '생산량',
            data: data.map(d => d.quantity),
            backgroundColor: 'rgba(54, 162, 235, 0.7)'
          }, {
            label: '목표량',
            data: data.map(d => d.target),
            backgroundColor: 'rgba(255, 206, 86, 0.7)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '제품별 생산 현황 차트'
            }
          }
        }
      });
    }

    // 생산 월별 차트
    function renderProductionMonthlyChart(data) {
      const ctx = document.getElementById('productionChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.month),
          datasets: [{
            label: '총 생산량',
            data: data.map(d => d.totalProduction),
            borderColor: 'rgba(54, 162, 235, 1)',
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            tension: 0.4
          }, {
            label: '불량품',
            data: data.map(d => d.defectProducts),
            borderColor: 'rgba(255, 99, 132, 1)',
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '월별 생산량 추이'
            }
          }
        }
      });
    }

    // 품질 차트
    function renderQualityChart(data) {
      const ctx = document.getElementById('qualityChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: data.map(d => d.type),
          datasets: [{
            data: data.map(d => d.count),
            backgroundColor: [
              'rgba(255, 99, 132, 0.7)',
              'rgba(54, 162, 235, 0.7)',
              'rgba(255, 206, 86, 0.7)',
              'rgba(75, 192, 192, 0.7)'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '불량 유형별 분포'
            }
          }
        }
      });
    }

    // 원인 분석 차트
    function renderCauseChart(causes) {
      const ctx = document.getElementById('causeChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: causes.map(c => c.cause),
          datasets: [{
            data: causes.map(c => c.percent),
            backgroundColor: [
              'rgba(255, 99, 132, 0.7)',
              'rgba(54, 162, 235, 0.7)',
              'rgba(255, 206, 86, 0.7)',
              'rgba(75, 192, 192, 0.7)'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '불량 원인 분포'
            },
            legend: {
              position: 'bottom'
            }
          }
        }
      });
    }

    // 인사 차트
    function renderHRChart(data) {
      const ctx = document.getElementById('hrChart');
      if (!ctx) return;

      if (currentChart) currentChart.destroy();

      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.name),
          datasets: [{
            label: '인원 (명)',
            data: data.map(d => d.employees),
            backgroundColor: 'rgba(153, 102, 255, 0.7)',
            yAxisID: 'y'
          }, {
            label: '출근율 (%)',
            data: data.map(d => d.attendance),
            backgroundColor: 'rgba(255, 159, 64, 0.7)',
            yAxisID: 'y1'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            title: {
              display: true,
              text: '부서별 인원 및 출근율'
            }
          },
          scales: {
            y: {
              type: 'linear',
              position: 'left',
              title: {
                display: true,
                text: '인원 (명)'
              }
            },
            y1: {
              type: 'linear',
              position: 'right',
              title: {
                display: true,
                text: '출근율 (%)'
              },
              grid: {
                drawOnChartArea: false
              }
            }
          }
        }
      });
    }

    // 숫자 포맷팅
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 에러 처리
    function handleError(error) {
      removeLoading();
      addMessage('오류가 발생했습니다. 다시 시도해주세요.', 'bot');
      console.error(error);
    }
  </script>
</body>
