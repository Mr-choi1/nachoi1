<script>
(function () {
  var app = document.getElementById('app');
  var sidebar = document.getElementById('sidebar');
  var sidebarOverlay = document.getElementById('sidebarOverlay');
  var sidebarCollapseBtn = document.getElementById('sidebarCollapseBtn');
  var mobileMenuBtn = document.getElementById('mobileMenuBtn');
  var newChatBtn = document.getElementById('newChatBtn');
  var themeToggle = document.getElementById('themeToggle');
  var themeIconMoon = document.getElementById('themeIconMoon');
  var themeIconSun = document.getElementById('themeIconSun');
  var themeLabel = document.getElementById('themeLabel');
  var dbBanner = document.getElementById('dbBanner');
  var bannerClose = document.getElementById('bannerClose');
  var chatScroll = document.getElementById('chatScroll');
  var emptyState = document.getElementById('emptyState');
  var messagesEl = document.getElementById('messages');
  var composerForm = document.getElementById('composerForm');
  var composerInput = document.getElementById('composerInput');
  var sendBtn = document.getElementById('sendBtn');
  var suggestionChips = document.querySelectorAll('.suggestion-chip');

  /* ---------- Theme ---------- */
  function applyTheme(theme) {
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeIconMoon.style.display = 'none';
      themeIconSun.style.display = '';
      themeLabel.textContent = '라이트 모드';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      themeIconMoon.style.display = '';
      themeIconSun.style.display = 'none';
      themeLabel.textContent = '다크 모드';
    }
  }

  var savedTheme = null;
  try { savedTheme = localStorage.getItem('sbai-theme'); } catch (e) {}
  if (savedTheme) {
    applyTheme(savedTheme);
  } else {
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light');
  }

  themeToggle.addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem('sbai-theme', next); } catch (e) {}
  });

  /* ---------- Sidebar (mobile) ---------- */
  function openSidebar() { app.classList.add('sidebar-open'); }
  function closeSidebar() { app.classList.remove('sidebar-open'); }
  mobileMenuBtn.addEventListener('click', openSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);
  sidebarCollapseBtn.addEventListener('click', closeSidebar);

  /* ---------- New chat ---------- */
  newChatBtn.addEventListener('click', function () {
    messagesEl.innerHTML = '';
    emptyState.style.display = 'flex';
    dbBanner.classList.remove('hidden');
    composerInput.value = '';
    autoGrow();
    closeSidebar();
  });

  /* ---------- Banner ---------- */
  bannerClose.addEventListener('click', function () {
    dbBanner.classList.add('hidden');
  });

  /* ---------- Composer ---------- */
  function autoGrow() {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 160) + 'px';
    sendBtn.disabled = composerInput.value.trim().length === 0;
  }
  composerInput.addEventListener('input', autoGrow);
  composerInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      composerForm.requestSubmit ? composerForm.requestSubmit() : sendMessage();
    }
  });

  suggestionChips.forEach(function (chip) {
    chip.addEventListener('click', function () {
      composerInput.value = chip.getAttribute('data-text');
      autoGrow();
      sendMessage();
    });
  });

  composerForm.addEventListener('submit', function (e) {
    e.preventDefault();
    sendMessage();
  });

  /* ---------- Message rendering ---------- */
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function appendUserMessage(text) {
    var row = document.createElement('div');
    row.className = 'msg msg-user';
    row.innerHTML =
      '<div class="msg-body"><div class="msg-text"></div></div>';
    row.querySelector('.msg-text').textContent = text;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function appendTypingIndicator() {
    var row = document.createElement('div');
    row.className = 'msg msg-assistant';
    row.id = 'typingRow';
    row.innerHTML =
      '<div class="msg-avatar">SB</div>' +
      '<div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    var row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  function buildBarChartSvg(chart) {
    var width = 420, height = 190, padding = { top: 10, right: 12, bottom: 26, left: 12 };
    var innerW = width - padding.left - padding.right;
    var innerH = height - padding.top - padding.bottom;
    var maxVal = Math.max.apply(null, chart.values) * 1.15;
    var n = chart.categories.length;
    var gap = 14;
    var barW = (innerW - gap * (n - 1)) / n;

    var bars = '';
    for (var i = 0; i < n; i++) {
      var v = chart.values[i];
      var barH = maxVal > 0 ? (v / maxVal) * innerH : 0;
      var x = padding.left + i * (barW + gap);
      var y = padding.top + (innerH - barH);
      bars +=
        '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + barH.toFixed(1) + '" rx="4" fill="var(--accent)" opacity="0.88"></rect>' +
        '<text class="chart-value-label" x="' + (x + barW / 2).toFixed(1) + '" y="' + (y - 6).toFixed(1) + '" text-anchor="middle">' + v + '</text>' +
        '<text class="chart-bar-label" x="' + (x + barW / 2).toFixed(1) + '" y="' + (height - 8).toFixed(1) + '" text-anchor="middle">' + escapeHtml(chart.categories[i]) + '</text>';
    }

    return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="auto" role="img" aria-label="' + escapeHtml(chart.title) + '">' +
      '<line x1="' + padding.left + '" y1="' + (height - padding.bottom) + '" x2="' + (width - padding.right) + '" y2="' + (height - padding.bottom) + '" stroke="var(--border)" stroke-width="1"></line>' +
      bars +
      '</svg>';
  }

  function appendAssistantMessage(reply) {
    var row = document.createElement('div');
    row.className = 'msg msg-assistant';
    var html = '<div class="msg-avatar">SB</div><div class="msg-body">';
    html += '<div class="msg-text">' + escapeHtml(reply.text || '') + '</div>';

    if (reply.type === 'image' && reply.images && reply.images.length) {
      html += '<div class="media-grid">';
      reply.images.forEach(function (img) {
        html += '<div class="media-card">' +
          '<div class="media-placeholder">' +
          '<svg viewBox="0 0 24 24" width="30" height="30"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="9.5" r="1.6" fill="currentColor"/><path d="M21 16l-5.5-5.5L9 17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</div>' +
          '<div class="media-caption">' + escapeHtml(img.caption || '이미지') + '</div>' +
          '</div>';
      });
      html += '</div>';
    }

    if (reply.type === 'chart' && reply.chart) {
      html += '<div class="chart-card">' +
        '<div class="chart-card-header"><span class="chart-title">' + escapeHtml(reply.chart.title || '') + '</span>' +
        '<span class="chart-unit">' + escapeHtml(reply.chart.unit || '') + '</span></div>' +
        buildBarChartSvg(reply.chart) +
        '</div>';
    }

    html += '</div>';
    row.innerHTML = html;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  /* ---------- Send flow ---------- */
  function sendMessage() {
    var text = composerInput.value.trim();
    if (!text) return;

    emptyState.style.display = 'none';
    appendUserMessage(text);
    composerInput.value = '';
    autoGrow();
    composerInput.focus();

    appendTypingIndicator();

    if (window.google && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function (reply) {
          removeTypingIndicator();
          appendAssistantMessage(reply);
        })
        .withFailureHandler(function (err) {
          removeTypingIndicator();
          appendAssistantMessage({ type: 'text', text: '응답 생성 중 오류가 발생했습니다: ' + (err && err.message ? err.message : err) });
        })
        .generateReply(text);
    } else {
      // 로컬 미리보기 환경(Apps Script 밖)일 때 폴백
      setTimeout(function () {
        removeTypingIndicator();
        appendAssistantMessage({ type: 'text', text: 'google.script.run을 사용할 수 없는 환경입니다.' });
      }, 400);
    }
  }
})();
</script>
