<style>
  :root {
    /* 해양(오션 블루) 팔레트 */
    --wave-1: #00FFFF;
    --wave-2: #00CED1;
    --wave-3: #1E90FF;
    --wave-4: #0000FF;

    --bg: rgba(235, 250, 252, 0.62);
    --bg-sidebar: rgba(223, 245, 248, 0.86);
    --bg-panel: #FFFFFF;
    --bg-hover: #DCF3F6;
    --border: #C3E6EA;
    --text: #0B2B36;
    --text-muted: #4B7481;
    --text-faint: #86AAB3;
    --accent: #1E90FF;
    --accent-hover: #0000FF;
    --accent-contrast: #FFFFFF;
    --user-bubble: #DCF4F6;
    --shadow: 0 1px 2px rgba(6, 40, 51, 0.08), 0 2px 10px rgba(6, 40, 51, 0.06);
    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --sidebar-w: 264px;
  }

  :root[data-theme="dark"] {
    --bg: rgba(6, 24, 35, 0.62);
    --bg-sidebar: rgba(9, 32, 45, 0.9);
    --bg-panel: #0E2B3A;
    --bg-hover: #143C4F;
    --border: #1C4B60;
    --text: #E3F6F8;
    --text-muted: #93C2CC;
    --text-faint: #5C8B96;
    --accent: #00CED1;
    --accent-hover: #1E90FF;
    --accent-contrast: #052430;
    --user-bubble: #123B4C;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 2px 12px rgba(0, 0, 0, 0.3);
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: rgba(6, 24, 35, 0.62);
      --bg-sidebar: rgba(9, 32, 45, 0.9);
      --bg-panel: #0E2B3A;
      --bg-hover: #143C4F;
      --border: #1C4B60;
      --text: #E3F6F8;
      --text-muted: #93C2CC;
      --text-faint: #5C8B96;
      --accent: #00CED1;
      --accent-hover: #1E90FF;
      --accent-contrast: #052430;
      --user-bubble: #123B4C;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 2px 12px rgba(0, 0, 0, 0.3);
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: linear-gradient(180deg, var(--bg-sidebar) 0%, var(--bg) 55%, var(--bg) 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Malgun Gothic", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; }

  .app {
    position: relative;
    display: flex;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
  }

  /* ---------- Ocean background ---------- */
  .ocean-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .ocean-bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 70% at 15% -10%, color-mix(in srgb, var(--wave-1) 22%, transparent) 0%, transparent 60%),
      radial-gradient(120% 80% at 100% 0%, color-mix(in srgb, var(--wave-3) 18%, transparent) 0%, transparent 55%),
      linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--wave-4) 10%, transparent) 100%);
  }

  .wave-layer {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    overflow: hidden;
    line-height: 0;
  }

  .wave-layer svg {
    display: block;
    width: 200%;
    max-width: none;
    height: 100%;
    animation: wave-drift linear infinite;
    will-change: transform;
  }

  .wave-layer.layer-1 { height: 34vh; opacity: 0.16; }
  .wave-layer.layer-1 svg { animation-duration: 42s; }
  .wave-layer.layer-2 { height: 24vh; opacity: 0.22; }
  .wave-layer.layer-2 svg { animation-duration: 30s; animation-direction: reverse; }
  .wave-layer.layer-3 { height: 15vh; opacity: 0.28; }
  .wave-layer.layer-3 svg { animation-duration: 20s; }

  @keyframes wave-drift {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .ship-track {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 22vh;
    height: 0;
  }

  .ship-drift {
    position: absolute;
    left: -22%;
    width: 230px;
    animation: ship-sail 70s linear infinite;
    opacity: 0.72;
    filter: drop-shadow(0 5px 6px rgba(0, 0, 0, 0.16));
  }

  .ship-bob {
    animation: ship-bob 4.5s ease-in-out infinite;
  }

  .ship-drift svg { display: block; width: 100%; height: auto; }

  @keyframes ship-sail {
    from { left: -22%; }
    to { left: 112%; }
  }

  @keyframes ship-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-3px) rotate(0.6deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .wave-layer svg, .ship-drift, .ship-bob { animation: none; }
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: var(--sidebar-w);
    flex: 0 0 var(--sidebar-w);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
    transition: margin-left 0.2s ease;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  .brand-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 9px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .new-chat-btn:hover { background: var(--bg-hover); }

  .sidebar-section { flex: 1; overflow-y: auto; }

  .sidebar-section-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 8px 8px;
  }

  .sidebar-empty {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-faint);
    padding: 10px 8px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    margin: 0 2px;
  }

  .sidebar-bottom {
    border-top: 1px solid var(--border);
    padding-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .ghost-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .ghost-row:hover { background: var(--bg-hover); color: var(--text); }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
  }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11.5px;
    font-weight: 600;
    flex: none;
  }

  .user-label {
    font-size: 12.5px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 20;
  }

  /* ---------- Main ---------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
    position: relative;
  }

  .mobile-topbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
  }
  .mobile-title { font-size: 14px; font-weight: 600; }
  .mobile-spacer { width: 32px; }

  .db-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 9px 12px;
    margin: 12px 16px 0;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .db-banner-icon { flex: none; color: var(--accent); }
  .db-banner span { flex: 1; line-height: 1.5; }
  .db-banner.hidden { display: none; }

  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    margin: auto 0;
  }

  .empty-mark {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 18px;
  }

  .empty-state h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 10px;
    color: var(--text);
  }

  .empty-state p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 440px;
    line-height: 1.6;
    margin: 0 0 20px;
  }

  .suggestion-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
  }

  .suggestion-chip {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text);
    font-size: 12.5px;
    cursor: pointer;
  }
  .suggestion-chip:hover { background: var(--bg-hover); border-color: var(--text-faint); }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 22px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 24px 24px;
  }

  .msg { display: flex; gap: 12px; }
  .msg-user { justify-content: flex-end; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex: none;
  }

  .msg-body { max-width: 78%; }
  .msg-user .msg-body {
    background: var(--user-bubble);
    padding: 10px 14px;
    border-radius: var(--radius-md);
  }

  .msg-text {
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-assistant .msg-text { color: var(--text); }

  /* image block */
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 10px;
    max-width: 420px;
  }

  .media-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--bg-panel);
  }

  .media-placeholder {
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-hover), var(--bg-sidebar));
    color: var(--text-faint);
  }

  .media-caption {
    font-size: 11.5px;
    color: var(--text-muted);
    padding: 7px 10px;
    border-top: 1px solid var(--border);
  }

  /* chart block */
  .chart-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-panel);
    padding: 16px 18px 10px;
    max-width: 480px;
  }

  .chart-card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .chart-unit { font-size: 11px; color: var(--text-faint); }

  .chart-bar-label {
    font-size: 10.5px;
    fill: var(--text-muted);
  }
  .chart-value-label {
    font-size: 10.5px;
    fill: var(--text);
    font-weight: 600;
  }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    animation: typing-bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Composer ---------- */
  .composer-wrap {
    padding: 10px 16px 16px;
  }

  .composer {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 10px 10px 10px 16px;
  }

  .composer-input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  .composer-input::placeholder { color: var(--text-faint); }

  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex: none;
  }
  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }

  .composer-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 30;
      margin-left: calc(-1 * var(--sidebar-w));
      box-shadow: var(--shadow);
    }
    .app.sidebar-open .sidebar { margin-left: 0; }
    .app.sidebar-open .sidebar-overlay { display: block; }
    .mobile-topbar { display: flex; }
    .db-banner { margin: 10px 12px 0; }
    .messages { padding: 16px 14px 20px; }
    .msg-body { max-width: 88%; }
  }
</style>
