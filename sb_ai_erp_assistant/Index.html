<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <div class="ocean-bg" aria-hidden="true">
    <div class="ocean-bg-gradient"></div>

    <div class="wave-layer layer-1">
      <svg viewBox="0 0 2880 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,150 C160,110 320,190 480,150 C640,110 800,190 960,150 C1120,110 1280,190 1440,150 L1440,320 L0,320 Z" fill="var(--wave-1)"></path>
        <g transform="translate(1440,0)">
          <path d="M0,150 C160,110 320,190 480,150 C640,110 800,190 960,150 C1120,110 1280,190 1440,150 L1440,320 L0,320 Z" fill="var(--wave-1)"></path>
        </g>
      </svg>
    </div>

    <div class="wave-layer layer-2">
      <svg viewBox="0 0 2880 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,130 C90,160 270,100 360,130 C450,160 630,100 720,130 C810,160 990,100 1080,130 C1170,160 1350,100 1440,130 L1440,320 L0,320 Z" fill="var(--wave-2)"></path>
        <g transform="translate(1440,0)">
          <path d="M0,130 C90,160 270,100 360,130 C450,160 630,100 720,130 C810,160 990,100 1080,130 C1170,160 1350,100 1440,130 L1440,320 L0,320 Z" fill="var(--wave-2)"></path>
        </g>
      </svg>
    </div>

    <div class="ship-track">
      <div class="ship-drift">
        <div class="ship-bob">
          <svg viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M8,72 L212,72 L198,90 L22,90 Z" fill="var(--text-muted)"></path>
            <rect x="14" y="60" width="190" height="12" fill="var(--text-muted)"></rect>
            <rect x="30" y="42" width="26" height="20" fill="var(--wave-3)"></rect>
            <rect x="58" y="46" width="26" height="16" fill="var(--wave-2)"></rect>
            <rect x="86" y="40" width="26" height="22" fill="var(--wave-4)"></rect>
            <rect x="114" y="46" width="26" height="16" fill="var(--wave-3)"></rect>
            <rect x="142" y="42" width="26" height="20" fill="var(--wave-2)"></rect>
            <rect x="172" y="30" width="24" height="32" fill="var(--text-muted)"></rect>
            <rect x="178" y="20" width="12" height="12" fill="var(--text-muted)"></rect>
          </svg>
        </div>
      </div>
    </div>

    <div class="wave-layer layer-3">
      <svg viewBox="0 0 2880 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,100 C120,65 360,135 480,100 C600,65 840,135 960,100 C1080,65 1320,135 1440,100 L1440,200 L0,200 Z" fill="var(--wave-3)"></path>
        <g transform="translate(1440,0)">
          <path d="M0,100 C120,65 360,135 480,100 C600,65 840,135 960,100 C1080,65 1320,135 1440,100 L1440,200 L0,200 Z" fill="var(--wave-3)"></path>
        </g>
      </svg>
    </div>
  </div>

  <div class="app" id="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <span class="brand-mark">SB</span>
          <span class="brand-name">SB AI</span>
        </div>
        <button class="icon-btn" id="sidebarCollapseBtn" aria-label="사이드바 접기">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 6h16M4 12h10M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        새 대화
      </button>

      <div class="sidebar-section">
        <div class="sidebar-section-title">대화 기록</div>
        <div class="sidebar-empty">
          데이터베이스 연동 후<br>대화 기록이 이 곳에 표시됩니다.
        </div>
      </div>

      <div class="sidebar-bottom">
        <button class="ghost-row" id="themeToggle" type="button">
          <svg id="themeIconMoon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg id="themeIconSun" viewBox="0 0 24 24" width="16" height="16" style="display:none"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="themeLabel">다크 모드</span>
        </button>
        <div class="user-chip">
          <span class="avatar">경</span>
          <span class="user-label">ERP Assistant · 미리보기</span>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main">
      <div class="mobile-topbar">
        <button id="mobileMenuBtn" class="icon-btn" aria-label="메뉴 열기" type="button">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="mobile-title">SB AI · ERP Assistant</span>
        <span class="mobile-spacer"></span>
      </div>

      <div class="db-banner" id="dbBanner">
        <svg viewBox="0 0 24 24" width="16" height="16" class="db-banner-icon"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v5M12 16.5v.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>DB가 아직 연동되지 않았습니다. 지금은 텍스트 · 이미지 · 그래프 응답 형식을 보여주는 미리보기 화면입니다.</span>
        <button id="bannerClose" class="icon-btn" aria-label="배너 닫기" type="button">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="chat-scroll" id="chatScroll">
        <div class="empty-state" id="emptyState">
          <div class="empty-mark">SB</div>
          <h1>무엇을 도와드릴까요?</h1>
          <p>ERP 업무에 대해 무엇이든 물어보세요. "그래프" 또는 "이미지"라는 단어를 포함해 질문하면 해당 응답 형식의 예시도 볼 수 있어요.</p>
          <div class="suggestion-row">
            <button class="suggestion-chip" type="button" data-text="이번 분기 생산 추이를 그래프로 보여줘">생산 추이 그래프</button>
            <button class="suggestion-chip" type="button" data-text="최근 입고 이미지를 보여줘">입고 이미지 확인</button>
            <button class="suggestion-chip" type="button" data-text="이번 달 재고 현황을 요약해줘">재고 현황 요약</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <div class="composer-wrap">
        <form class="composer" id="composerForm">
          <textarea id="composerInput" class="composer-input" rows="1" placeholder="메시지를 입력하세요..." maxlength="2000"></textarea>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="전송" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 19V5M5 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </form>
        <div class="composer-hint">SB AI는 실수를 할 수 있습니다. 중요한 정보는 다시 한 번 확인하세요.</div>
      </div>
    </main>
  </div>

  <?!= include('JavaScript'); ?>
</body>
</html>
